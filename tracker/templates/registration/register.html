<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Productivity Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #fafafa;
            --surface:     #ffffff;
            --border:      #e5e7eb;
            --text-main:   #111827;
            --text-muted:  #6b7280;
            --accent:      #6366f1;
            --accent-hover:#4f46e5;
            --focus-ring:  rgba(99, 102, 241, 0.2);
            --radius-md:   12px;
            --radius-sm:   8px;
            --shadow-sm:   0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md:   0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg:   0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg:          #0f111a;
                --surface:     #171a26;
                --border:      #2a2f42;
                --text-main:   #f9fafb;
                --text-muted:  #9ca3af;
                --accent:      #818cf8;
                --accent-hover:#6366f1;
                --focus-ring:  rgba(129, 140, 248, 0.2);
                --shadow-sm:   0 1px 2px 0 rgba(0, 0, 0, 0.3);
                --shadow-md:   0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
                --shadow-lg:   0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
            }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
        }

        .auth-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            background-color: var(--accent);
            color: white;
            border-radius: var(--radius-md);
            font-size: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* Django form rendering overrides */
        form p {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin: 0;
        }

        form p label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        form p input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        form p input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .submit-btn {
            margin-top: 8px;
            width: 100%;
            padding: 12px 20px;
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: var(--shadow-sm);
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .links {
            margin-top: 32px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }
        
        .errorlist {
            color: #ef4444;
            font-size: 13px;
            list-style: none;
            margin: 0;
            padding: 10px 12px;
            background-color: rgba(239, 68, 68, 0.1);
            border-radius: var(--radius-sm);
            border-left: 3px solid #ef4444;
        }
        
        .helptext {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="header">
                <div class="logo">⚡</div>
                <h2>Create an account</h2>
                <div class="subtitle">Start tracking your productivity today.</div>
            </div>
            
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="submit-btn">Sign Up</button>
            </form>
        </div>
        
        <div class="links">
            <p>Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
        </div>
    </div>
</body>
</html>
