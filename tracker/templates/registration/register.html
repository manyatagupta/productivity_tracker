
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Productivity Tracker</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 2rem; box-sizing: border-box; }
        .auth-container { background: #1e1e1e; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-top: 0; }
        form { display: flex; flex-direction: column; gap: 1rem; text-align: left; }
        label { font-size: 0.9rem; color: #bbb; }
        input { padding: 0.8rem; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: white; width: 100%; box-sizing: border-box; }
        .helptext, .errorlist { font-size: 0.8rem; color: #888; margin: 0; padding: 0; }
        .errorlist { color: #ff5252; list-style-type: none; }
        button { background: #4caf50; color: white; border: none; padding: 0.8rem; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 1rem; }
        button:hover { background: #45a049; }
        .links { margin-top: 1rem; font-size: 0.9rem; }
        .links a { color: #4caf50; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Create an Account</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
        <div class="links">
            <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
        </div>
    </div>
</body>
</html>
