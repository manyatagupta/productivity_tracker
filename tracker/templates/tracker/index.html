<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Productivity Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      body { 
    font-family: 'Poppins', sans-serif; 
    max-width: 600px; 
    margin: 40px auto; 
    padding: 20px; 
    background-color: #f4f7f6; 
}
    </style>
</head>
<body>

    <h1>My Daily Tasks</h1>
    
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" placeholder="What do you need to do?" required>
        <button type="submit">Add Task</button>
    </form>

    <br>

    <div>
        {% for task in tasks %}
            <div class="task">
                <div>
                    <span class="{% if task.is_completed %}completed{% endif %}">
                        {{ task.title }}
                    </span>
                    
                    <small style="color: #888; display: block; font-size: 11px; margin-top: 5px;">
                        Created on: {{ task.created_at|date:"M d, Y H:i" }}
                    </small>
                </div>
                
                <div class="actions">
                    {% if not task.is_completed %}
                        <a href="?complete={{ task.id }}" class="btn-done">Done</a>
                    {% endif %}
                    <!-- NAYA DELETE BUTTON -->
                    <a href="?delete={{ task.id }}" class="btn-delete">Delete</a>
                </div>
            </div>
        {% empty %}
            <p>No tasks yet. You are all caught up!</p>
        {% endfor %}
    </div>

</body>
</html>
