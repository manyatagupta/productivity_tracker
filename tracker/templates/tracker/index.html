<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Productivity Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin: 0;
            padding-top: 50px;
        }

        .main-wrapper {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin: 0 auto; 
        }

        /* --- Commit 3: Input & Button Styles --- */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] { 
            flex: 1;
            padding: 12px 15px; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            outline: none;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #4361ee; 
        }

        button { 
            padding: 12px 20px; 
            background-color: #4361ee; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            background-color: #3046c4;
            transform: translateY(-2px); 
        }
        /* --- Commit 4: Task Card Styles --- */
       
.task {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
    border: 1px solid #eee;
}

.task:hover {
    transform: scale(1.02);
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.completed {
    text-decoration: line-through;
    color: #a0a0a0;
}

.actions {
    display: flex;
    gap: 10px;
}

.btn-done, .btn-delete {
    padding: 6px 12px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
}

.btn-done {
    background-color: #d1fae5;
    color: #065f46;
}

.btn-delete {
    background-color: #fee2e2;
    color: #991b1b;
}
/* -------------------------------------- */

        /* -------------------------------------- */

    </style>
</head>
<body>
    <div class="main-wrapper"> 
        
        <h1>My Daily Tasks 📝</h1>
        
        <form method="POST" class="input-group"> 
            {% csrf_token %}
            <input type="text" name="title" placeholder="Aaj kya karna hai?" required>
            <button type="submit">Add Task</button>
        </form>

        <br>

        <div>
            <div class="task">
    <div>
        <span class="{% if task.is_completed %}completed{% endif %}">
            {{ task.title }}
        </span>
        <small style="color: #888; display: block; font-size: 11px; margin-top: 5px;">
            Created on: {{ task.created_at|date:"M d, Y H:i" }}
        </small>
    </div>
    
    <div class="actions">
        {% if not task.is_completed %}
            <a href="?complete={{ task.id }}" class="btn-done">Done</a>
        {% endif %}
        <a href="?delete={{ task.id }}" class="btn-delete">Delete</a>
    </div>
</div>
                
            {% endfor %}
        </div>

    </div> 
</body>
</html>
