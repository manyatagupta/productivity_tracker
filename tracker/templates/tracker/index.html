<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Productivity Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .task { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #ccc; }
        .completed { text-decoration: line-through; color: gray; }
        .actions { display: flex; gap: 10px; }
        input[type="text"] { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete { color: white; background-color: #dc3545; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 14px;}
        .btn-done { color: white; background-color: #007bff; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 14px;}
    </style>
</head>
<body>

    <h1>My Daily Tasks</h1>
    
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" placeholder="What do you need to do?" required>
        <button type="submit">Add Task</button>
    </form>

    <br>

    <div>
        {% for task in tasks %}
            <div class="task">
                <div>
                    <span class="{% if task.is_completed %}completed{% endif %}">
                        {{ task.title }}
                    </span>
                    
                    <small style="color: #888; display: block; font-size: 11px; margin-top: 5px;">
                        Created on: {{ task.created_at|date:"M d, Y H:i" }}
                    </small>
                </div>
                
                <div class="actions">
                    {% if not task.is_completed %}
                        <a href="?complete={{ task.id }}" class="btn-done">Done</a>
                    {% endif %}
                    <!-- NAYA DELETE BUTTON -->
                    <a href="?delete={{ task.id }}" class="btn-delete">Delete</a>
                </div>
            </div>
        {% empty %}
            <p>No tasks yet. You are all caught up!</p>
        {% endfor %}
    </div>

</body>
</html>
