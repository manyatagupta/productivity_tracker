<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Tracker | Master Your Time</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #07080a;
            --text-main: #ffffff;
            --text-muted: #9c9c9d;
            --accent-gradient: linear-gradient(90deg, #c084fc, #818cf8, #3b82f6);
            --font-ui: 'Inter', sans-serif;
            --font-mono: 'Geist Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-ui);
            background-color: transparent; /* Vanta handles background */
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══ Vanta Background ═══ */
        #vanta-bg {
            position: fixed;
            z-index: -1;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        /* ═══ Floating Pill Nav ═══ */
        .pill-nav {
            position: fixed;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px 8px 16px;
            background: rgba(25, 25, 26, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            width: 90%;
            max-width: 800px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo-glyph {
            width: 20px;
            height: 20px;
            background: var(--accent-gradient);
            border-radius: 4px;
            transform: rotate(45deg);
            display: inline-block;
        }

        .nav-wordmark {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.01em;
        }

        .nav-center {
            display: flex;
            gap: 24px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-link {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .nav-link:hover { color: #ffffff; }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-btn-muted {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
        }
        .nav-btn-muted:hover { color: #ffffff; }

        .nav-btn-primary {
            background: #ffffff;
            color: #07080a;
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .nav-btn-primary:hover { opacity: 0.9; }

        /* ═══ Hero Section ═══ */
        .hero {
            margin-top: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 24px;
            width: 100%;
            max-width: 900px;
            position: relative;
            z-index: 10;
        }

        .eyebrow {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 16px;
            border-radius: 100px;
            margin-bottom: 24px;
        }

        .headline {
            font-size: 64px !important;
            font-weight: 600;
            line-height: 1.1;
            color: #ffffff;
            letter-spacing: -0.04em;
            margin-bottom: 24px;
        }

        .headline .gradient-text {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            letter-spacing: 0.2px;
            max-width: 640px;
            margin-bottom: 40px;
        }

        /* ═══ Tactile Keycap Buttons ═══ */
        .button-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .keycap-btn {
            background: #e6e6e6;
            color: #2f3031;
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            
            /* The physical depth illusion */
            box-shadow: 
                0 0 0 2px #000000,
                0 0 14px rgba(255, 255, 255, 0.19),
                inset 0 1px 1px rgba(255, 255, 255, 0.8),
                inset 0 -1px 2px rgba(0, 0, 0, 0.15),
                0 4px 6px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .keycap-btn:active {
            transform: translateY(2px);
            box-shadow: 
                0 0 0 2px #000000,
                0 0 8px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.4),
                inset 0 -1px 0 rgba(0, 0, 0, 0.1),
                0 1px 2px rgba(0, 0, 0, 0.4);
        }

        .keycap-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .install-caption {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 64px;
        }

        /* ═══ Command Palette Mockup ═══ */
        .cmd-palette {
            width: 100%;
            max-width: 640px;
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.05);
            overflow: hidden;
            text-align: left;
            margin-bottom: 40px;
        }

        .cmd-input-row {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .cmd-input-row svg {
            width: 18px; height: 18px; color: var(--text-muted); margin-right: 12px;
        }

        .cmd-query {
            font-family: var(--font-ui);
            font-size: 18px;
            color: #ffffff;
            font-weight: 500;
        }

        .caret {
            width: 2px;
            height: 20px;
            background: #c084fc;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .cmd-mode-pill {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.1);
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .cmd-list { padding: 8px; }

        .cmd-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            color: var(--text-muted);
        }

        .cmd-item.active {
            background: rgba(192, 132, 252, 0.15); /* Warm purple tint */
            color: #ffffff;
        }

        .cmd-item svg { width: 16px; height: 16px; margin-right: 12px; }
        
        .cmd-label {
            font-size: 14px;
            font-weight: 500;
            flex: 1;
        }

        .cmd-arg {
            font-family: var(--font-mono);
            opacity: 0.6;
            margin-left: 8px;
        }

        .cmd-shortcut {
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 4px 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
        }

        .cmd-footer {
            padding: 10px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cmd-hints {
            font-family: var(--font-mono);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ═══ Ghost Pill ═══ */
        .ghost-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: 60px;
        }
        .ghost-pill:hover {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 768px) {
            .nav-center { display: none; }
            .headline { font-size: 40px !important; }
            .button-row { flex-direction: column; width: 100%; }
            .keycap-btn { justify-content: center; }
            .pill-nav { width: 95%; top: 16px; }
            .hero { margin-top: 120px; }
        }
    </style>
</head>
<body>
</body>
</html>
